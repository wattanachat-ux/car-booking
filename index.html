<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เอกสารเบิกรถ Guts IOC</title>
<style>
body{font-family:Arial;background:#eef2f7;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;max-width:1400px;margin:auto;box-shadow:0 10px 30px rgba(0,0,0,.1)}
h2{margin-top:0}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
input,select{padding:8px;border:1px solid #ccc;border-radius:8px}
button{border:none;border-radius:8px;background:#2d6cdf;color:#fff;font-weight:bold;cursor:pointer;padding:10px}
button.red{background:#e5533d}
button.green{background:#0a8a2a}
button.gray{background:#555}
button.purple{background:#7b2cff}
.table{width:100%;border-collapse:collapse;margin-top:20px}
.table th,.table td{border:1px solid #ccc;padding:6px;text-align:center}
.status-ok{color:#0a8a2a;font-weight:bold}
.status-wait{color:#d18b00;font-weight:bold}
.status-no{color:#c10000;font-weight:bold}
.dashboard{margin-top:20px;padding:12px;background:#f5f7fb;border-radius:8px}
.busy{color:#c10000;font-weight:bold}
.summary{margin-top:10px;font-weight:bold}
.filterBox{margin-top:20px;background:#f1f3f8;padding:10px;border-radius:8px}
.pagination{margin-top:15px;text-align:center}
.pagination button{margin:2px;padding:6px 12px}
</style>
</head>
<body>

<div class="card">
<h2>🚗 เอกสารเบิกรถ Guts IOC</h2>

<div class="grid">
<div>
<label>วันที่</label>
<input type="date" id="date" onchange="renderAll()">
</div>

<div>
<label>ทะเบียนรถ</label>
<select id="car"></select>
</div>

<div>
<label>โครงการ</label>
<input id="project">
</div>

<div>
<label>ผู้ขับ</label>
<select id="driver"></select>
</div>

<div>
<label>ผู้ร่วมเดินทาง 1</label>
<select id="p1"></select>
</div>

<div>
<label>ผู้ร่วมเดินทาง 2</label>
<select id="p2"></select>
</div>

<div>
<label>เวลาเริ่ม</label>
<input type="time" id="start">
</div>

<div>
<label>เวลาจบ</label>
<input type="time" id="end">
</div>
</div>

<br>
<button onclick="saveBooking()">บันทึก</button>
<button class="red" onclick="loginAdmin()" id="loginBtn">Admin Login</button>
<button class="purple" onclick="logoutAdmin()" id="logoutBtn" style="display:none">Admin Logout</button>

<div class="dashboard" id="dash"></div>
<div class="summary" id="summary"></div>

<div class="filterBox">
<b>Filter</b>
<div class="grid">
<select id="filterCar"></select>
<select id="filterDriver"></select>
<input type="date" id="filterDate">
<button onclick="applyFilter()">ค้นหา</button>
</div>
</div>

<table class="table">
<thead>
<tr>
<th>วันที่</th>
<th>รถ</th>
<th>โครงการ</th>
<th>ผู้ขับ</th>
<th>ผู้ร่วมเดินทาง</th>
<th>เวลา</th>
<th>สถานะ</th>
<th>อนุมัติ</th>
<th id="thDelete" style="display:none">ลบ</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<div class="pagination" id="page"></div>

</div>

<script>

let admin=false
let adminName=""
let bookings=JSON.parse(localStorage.getItem("fleetFinal")||"[]")
let filtered=[...bookings]
let page=1
let perPage=5

const todayStr=new Date().toISOString().split("T")[0]
date.min=todayStr

const peopleDriver=[
"จิรศักดิ์","จุติมา","วัฒนะชาติ","โกเมน","อานนท์","รด","พิชชากร","สรวิศ.ก","สรวิศ.พ","ภูวดล","กฤษพล","ชยุต","เอมมิกา","ชัชโภคิณ","ณัฐพล","พัชรวรรณ"
]

const peoplePassenger=[
"-- ไม่มีผู้ร่วมเดินทาง --",
...peopleDriver
]

const cars=[
"toyota yaris 6กญ1240",
"toyota yaris 6กฌ9085",
"toyota revo 1ฒภ6727",
"toyota revo 2ฒข4846"
]

const dateInput=document.getElementById("date")
const carInput=document.getElementById("car")
const projectInput=document.getElementById("project")
const driverSel=document.getElementById("driver")
const p1Sel=document.getElementById("p1")
const p2Sel=document.getElementById("p2")
const startInput=document.getElementById("start")
const endInput=document.getElementById("end")
const tb=document.getElementById("tb")
const dash=document.getElementById("dash")
const summary=document.getElementById("summary")
const logoutBtn=document.getElementById("logoutBtn")
const loginBtn=document.getElementById("loginBtn")
const pageDiv=document.getElementById("page")
const thDelete=document.getElementById("thDelete")

const filterCar=document.getElementById("filterCar")
const filterDriver=document.getElementById("filterDriver")
const filterDate=document.getElementById("filterDate")

cars.forEach(c=>{
 carInput.add(new Option(c,c))
 filterCar.add(new Option(c,c))
})
filterCar.add(new Option("ทั้งหมด",""))

peopleDriver.forEach(p=>{
 driverSel.add(new Option(p,p))
 filterDriver.add(new Option(p,p))
})
filterDriver.add(new Option("ทั้งหมด",""))

peoplePassenger.forEach(p=>{
 p1Sel.add(new Option(p,p))
 p2Sel.add(new Option(p,p))
})

function saveBooking(){
const date=dateInput.value
if(date<todayStr){alert("ห้ามลงย้อนหลัง");return}

const car=carInput.value
const project=projectInput.value
const driver=driverSel.value
const p1=p1Sel.value
const p2=p2Sel.value
let s=startInput.value
let e=endInput.value

if(!date||!project||!s||!e){alert("กรอกข้อมูลให้ครบ");return}

if(e < s){ e = "23:59" }

// 🔥 ถ้ามีรถคันนี้ในวันเดียวกันอยู่แล้ว → ไม่อนุมัติทันที
let duplicate=bookings.find(b=>b.date===date && b.car===car)

let status = duplicate ? "ไม่อนุมัติ" : "รอ"
if(duplicate) status="ไม่อนุมัติ"

bookings.push({id:Date.now(),date,car,project,driver,p1,p2,start:s,end:e,status,approvedBy:""})
store();renderAll()
}

function renderAll(){
filtered=[...bookings]
renderTable()
renderDashboard()
renderSummary()
}

function renderTable(){
let startIndex=(page-1)*perPage
let data=filtered.slice(startIndex,startIndex+perPage)
let html=""

data.forEach(b=>{
let approveCell=b.approvedBy||"-"
let deleteCell=""
let statusClass="status-wait"
let statusText="รอ"

if(b.status==="อนุมัติ"){statusClass="status-ok";statusText="อนุมัติ"}
if(b.status==="ไม่อนุมัติ"){statusClass="status-no";statusText="ไม่อนุมัติ"}

if(admin){
deleteCell=`<button class='gray' onclick='deleteBooking(${b.id})'>ลบ</button>`

 if(b.status==="รอ"){
 let hasActive=bookings.find(x=>x.car===b.car && x.date===b.date && x.status==="อนุมัติ")
 if(hasActive){ approveCell="❌ มีการอนุมัติแล้ว" }
 else{
 approveCell=`<button onclick="approve(${b.id})">อนุมัติ</button>
 <button onclick="deny(${b.id})" class='red'>ไม่อนุมัติ</button>`
 }
 }
}

html+=`<tr>
<td>${b.date}</td>
<td>${b.car}</td>
<td>${b.project}</td>
<td>${b.driver}</td>
<td>${b.p1}${b.p2!=="-- ไม่มีผู้ร่วมเดินทาง --"?", "+b.p2:""}</td>
<td>${b.start} - ${b.end}</td>
<td class='${statusClass}'>${statusText}</td>
<td>${approveCell}</td>
<td>${admin?deleteCell:""}</td>
</tr>`
})

tb.innerHTML=html
renderPagination()
}

function deleteBooking(id){
bookings=bookings.filter(b=>b.id!==id)
store();renderAll()
}

function renderPagination(){
let total=Math.ceil(filtered.length/perPage)
if(total<=1){ pageDiv.innerHTML=""; return }

if(page>total) page=total
if(page<1) page=1

let html=""
html+=`<button onclick="prevPage()"> < </button>`

let start=Math.max(1,page-2)
let end=Math.min(total,start+4)

if(start>1){ html+=`<button onclick="goPage(1)">1</button> ... ` }

for(let i=start;i<=end;i++){
 html+=`<button onclick="goPage(${i})" ${i===page?"style='background:#0a8a2a'":""}>${i}</button>`
}

if(end<total){ html+=` ... <button onclick="goPage(${total})">${total}</button>` }

html+=`<button onclick="nextPage()"> > </button>`

pageDiv.innerHTML=html
}

function prevPage(){ page--; renderTable() }
function nextPage(){ page++; renderTable() }
function goPage(p){ page=p; renderTable() }

function applyFilter(){
filtered=bookings.filter(b=>{
 return (!filterCar.value || b.car===filterCar.value)
 && (!filterDriver.value || b.driver===filterDriver.value)
 && (!filterDate.value || b.date===filterDate.value)
})
page=1
renderTable()
}

function approve(id){ bookings.forEach(b=>{ if(b.id===id){ b.status="อนุมัติ"; b.approvedBy=adminName } }) ; store();renderAll() }
function deny(id){ bookings.forEach(b=>{ if(b.id===id){ b.status="ไม่อนุมัติ" } }) ; store();renderAll() }

function loginAdmin(){
let pass=prompt("รหัส")
if(pass==="11223344"){ admin=true; adminName="จิรศักดิ์" }
if(pass==="12121212"){ admin=true; adminName="จุติมา" }
if(admin){ logoutBtn.style.display="block"; loginBtn.style.display="none"; thDelete.style.display="table-cell" }
renderAll()
}

function logoutAdmin(){
admin=false
adminName=""
logoutBtn.style.display="none"
loginBtn.style.display="block"
thDelete.style.display="none"
renderAll()
}

function renderDashboard(){
let d=dateInput.value
let html="<b>รถที่กำลังใช้งานอยู่</b><br>"
let found=false

cars.forEach(c=>{
let busy=bookings.find(x=>x.car===c && x.date===d && x.status==="อนุมัติ")
if(busy){ html+=`<div class='busy'>${c}</div>`; found=true }
})

if(!found){ html="ไม่มีรถใช้งาน" }

dash.innerHTML=html
}

function renderSummary(){
let today=dateInput.value
let activeCount=bookings.filter(b=>b.date===today && b.status==="อนุมัติ").length
let waitCount=bookings.filter(b=>b.date===today && b.status==="รอ").length
let denyCount=bookings.filter(b=>b.date===today && b.status==="ไม่อนุมัติ").length
summary.innerHTML=`วันนี้ อนุมัติ ${activeCount} | รอ ${waitCount} | ไม่อนุมัติ ${denyCount}`
}

function store(){ localStorage.setItem("fleetFinal",JSON.stringify(bookings)) }

renderAll()

</script>
</body>
</html>
