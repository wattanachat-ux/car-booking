<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เอกสารเบิกรถ Guts IOC</title>
<style>
body{font-family:Arial;background:#eef2f7;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;max-width:1400px;margin:auto;box-shadow:0 10px 30px rgba(0,0,0,.1)}
h2{margin-top:0}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
input,select{padding:8px;border:1px solid #ccc;border-radius:8px}
button{border:none;border-radius:8px;background:#2d6cdf;color:#fff;font-weight:bold;cursor:pointer;padding:10px}
button.red{background:#e5533d}
button.green{background:#0a8a2a}
button.gray{background:#555}
button.purple{background:#7b2cff}
.table{width:100%;border-collapse:collapse;margin-top:20px}
.table th,.table td{border:1px solid #ccc;padding:6px;text-align:center}
.status-ok{color:#0a8a2a;font-weight:bold}
.status-wait{color:#d18b00;font-weight:bold}
.status-no{color:#c10000;font-weight:bold}
.dashboard{margin-top:20px;padding:12px;background:#f5f7fb;border-radius:8px}
.busy{color:#c10000;font-weight:bold}
.summary{margin-top:10px;font-weight:bold}
.filterBox{margin-top:20px;background:#f1f3f8;padding:10px;border-radius:8px}
.pagination{margin-top:15px;text-align:center}
.pagination button{margin:2px;padding:6px 12px}
</style>
</head>
<body>

<div class="card">
<h2>🚗 เอกสารเบิกรถ Guts IOC</h2>

<div class="grid">
<div><label>วันที่</label><input type="date" id="date" onchange="renderAll();lockCarDropdown()"></div>
<div><label>ทะเบียนรถ</label><select id="car"></select></div>
<div><label>โครงการ</label><input id="project"></div>
<div><label>ผู้ขับ</label><select id="driver"></select></div>
<div><label>ผู้ร่วมเดินทาง 1</label><select id="p1"></select></div>
<div><label>ผู้ร่วมเดินทาง 2</label><select id="p2"></select></div>
<div><label>เวลาเริ่ม</label><input type="time" id="start"></div>
<div><label>เวลาจบ</label><input type="time" id="end"></div>
</div>

<br>
<button onclick="saveBooking()">บันทึก</button>
<button class="green" id="exportBtn" style="display:none" onclick="exportCSV()">Export CSV</button>
<button class="red" onclick="loginAdmin()" id="loginBtn">Admin Login</button>
<button class="purple" onclick="logoutAdmin()" id="logoutBtn" style="display:none">Admin Logout</button>

<div class="dashboard" id="dash"></div>
<div class="summary" id="summary"></div>

<div class="filterBox">
<b>Filter</b>
<div class="grid">
<select id="filterCar"></select>
<select id="filterDriver"></select>
<input type="date" id="filterDate">
<button onclick="applyFilter()">ค้นหา</button>
</div>
</div>

<table class="table">
<thead>
<tr>
<th>วันที่</th><th>รถ</th><th>โครงการ</th><th>ผู้ขับ</th><th>ผู้ร่วมเดินทาง</th><th>เวลา</th><th>สถานะ</th><th>อนุมัติ</th>
<th id="thDelete" style="display:none">ลบ</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<div class="pagination" id="page"></div>
</div>

<script>
// --- เชื่อมต่อ Google Sheets ---
const API = "https://script.google.com/macros/s/AKfycbwgckQR2Ty2mZAOdi8ExG2ZWCdQyPVhhMjvjwsSt8M9ishFmMFVFWjkzuvnWfq4gj48tw/exec"; 

let admin=false; let adminName=""; let bookings=[]; 
let filtered=[]; let page=1; let perPage=5;

const dateInput=document.getElementById("date"); const carInput=document.getElementById("car");
const projectInput=document.getElementById("project"); const driverSel=document.getElementById("driver");
const p1Sel=document.getElementById("p1"); const p2Sel=document.getElementById("p2");
const startInput=document.getElementById("start"); const endInput=document.getElementById("end");
const tb=document.getElementById("tb"); const dash=document.getElementById("dash");
const summary=document.getElementById("summary"); const logoutBtn=document.getElementById("logoutBtn");
const loginBtn=document.getElementById("loginBtn"); const pageDiv=document.getElementById("page");
const thDelete=document.getElementById("thDelete"); const exportBtn=document.getElementById("exportBtn");
const filterCar=document.getElementById("filterCar"); const filterDriver=document.getElementById("filterDriver");
const filterDate=document.getElementById("filterDate");

const cars = ["toyota yaris 6กญ1240","toyota yaris 6กฌ9085","toyota revo 1ฒภ6727","toyota revo 2ฒข4846"];
const peopleDriver = ["จิรศักดิ์","จุติมา","วัฒนะชาติ","โกเมน","อานนท์","รด","พิชชากร","สรวิศ.ก","สรวิศ.พ","ภูวดล","กฤษพล","ชยุต","เอมมิกา","ชัชโภคิณ","ณัฐพล","พัชรวรรณ"];

// --- Initialize ---
window.onload = loadData;

async function loadData() {
    const res = await fetch(API);
    bookings = await res.json();
    renderAll();
    lockCarDropdown();
}

async function store() {
    await fetch(API, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(bookings)
    });
}

function saveBooking(){
    const d=dateInput.value; if(!d) return alert("เลือกวันที่");
    const car=carInput.value; const project=projectInput.value;
    const driver=driverSel.value; const p1=p1Sel.value; const p2=p2Sel.value;
    let s=startInput.value; let e=endInput.value;

    if(!driver){alert("ต้องเลือกผู้ขับ");return}
    bookings.push({id:Date.now(),date:d,car,project,driver,p1,p2,start:s,end:e,status:"รอ",approvedBy:""});
    store(); renderAll(); lockCarDropdown(); alert("บันทึกเรียบร้อย");
}

function renderAll(){ filtered=[...bookings]; renderTable(); renderDashboard(); renderSummary(); }

function renderTable(){
    let startIndex=(page-1)*perPage; let data=filtered.slice(startIndex,startIndex+perPage);
    let html="";
    data.forEach(b=>{
        let statusText = b.status || "รอ";
        let statusClass = b.status==="อนุมัติ" ? "status-ok" : (b.status==="ไม่อนุมัติ" ? "status-no" : "status-wait");
        let approveCell=b.approvedBy||"-";
        if(admin && b.status==="รอ"){
            approveCell=`<button onclick="approve(${b.id})">อนุมัติ</button> <button onclick="deny(${b.id})" class='red'>ไม่อนุมัติ</button>`;
        }
        html+=`<tr><td>${b.date}</td><td>${b.car}</td><td>${b.project}</td><td>${b.driver}</td><td>${b.p1}</td><td>${b.start}-${b.end}</td><td class='${statusClass}'>${statusText}</td><td>${approveCell}</td><td>${admin?`<button class='gray' onclick='deleteBooking(${b.id})'>ลบ</button>`:""}</td></tr>`;
    });
    tb.innerHTML=html; renderPagination();
}

function approve(id){
    let target=bookings.find(b=>b.id===id);
    target.status="อนุมัติ"; target.approvedBy=adminName;
    store(); renderAll();
}

function deny(id){ bookings.find(b=>b.id===id).status="ไม่อนุมัติ"; store(); renderAll(); }
function deleteBooking(id){ bookings=bookings.filter(b=>b.id!==id); store(); renderAll(); }

function loginAdmin(){
    let pass=prompt("รหัส");
    if(pass==="11223344" || pass==="12121212"){
        admin=true; adminName=(pass==="11223344")?"จิรศักดิ์":"จุติมา";
        logoutBtn.style.display="inline-block"; loginBtn.style.display="none"; thDelete.style.display="table-cell"; exportBtn.style.display="inline-block";
        renderAll();
    }
}

function logoutAdmin(){ admin=false; adminName=""; logoutBtn.style.display="none"; loginBtn.style.display="inline-block"; thDelete.style.display="none"; exportBtn.style.display="none"; renderAll(); }

function renderDashboard(){
    let d=dateInput.value;
    let busyCars = bookings.filter(x=>x.date===d && x.status==="อนุมัติ").map(x=>x.car);
    dash.innerHTML = busyCars.length > 0 ? `<b>รถใช้งานอยู่:</b><br><div class='busy'>${busyCars.join(', ')}</div>` : "ไม่มีรถใช้งาน";
}

function renderSummary(){
    let today=dateInput.value;
    let count = (s) => bookings.filter(b=>b.date===today && b.status===s).length;
    summary.innerHTML=`วันนี้ อนุมัติ ${count("อนุมัติ")} | รอ ${count("รอ")} | ไม่อนุมัติ ${count("ไม่อนุมัติ")}`;
}

function lockCarDropdown(){ /* logic เดิม */ }
function exportCSV(){ /* logic เดิม */ }
function renderPagination(){ /* logic เดิม */ }
function applyFilter(){ /* logic เดิม */ }
</script>
</body>
</html>
