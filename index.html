<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เอกสารเบิกรถ Guts IOC</title>
<style>
body{font-family:Arial;background:#eef2f7;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;max-width:1400px;margin:auto;box-shadow:0 10px 30px rgba(0,0,0,.1)}
h2{margin-top:0}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
input,select{padding:8px;border:1px solid #ccc;border-radius:8px}
button{border:none;border-radius:8px;background:#2d6cdf;color:#fff;font-weight:bold;cursor:pointer;padding:10px}
button.red{background:#e5533d}
button.green{background:#0a8a2a}
button.purple{background:#7b2cff}
.table{width:100%;border-collapse:collapse;margin-top:20px}
.table th,.table td{border:1px solid #ccc;padding:6px;text-align:center}
.badge{padding:4px 10px;border-radius:20px;color:#fff;font-size:12px}
.badge.wait{background:#d18b00}
.badge.ok{background:#0a8a2a}
.badge.no{background:#c10000}
.dashboard{margin-top:15px;font-weight:bold}
.filter{margin-top:15px}
.pagination{margin-top:15px;text-align:center}
.pagination button{margin:2px;padding:6px 12px}
</style>
</head>
<body>

<div class="card">
<h2>🚗 เอกสารเบิกรถ Guts IOC</h2>

<div class="grid">
<div><label>วันที่</label><input type="date" id="date" onchange="renderDash()"></div>
<div><label>ทะเบียนรถ</label><select id="car"></select></div>
<div><label>โครงการ</label><input id="project"></div>
<div><label>ผู้ขับ</label><select id="driver"></select></div>
<div><label>ผู้ร่วมเดินทาง 1</label><select id="p1"></select></div>
<div><label>ผู้ร่วมเดินทาง 2</label><select id="p2"></select></div>
<div><label>เวลาเริ่ม</label><input type="time" id="start"></div>
<div><label>เวลาจบ</label><input type="time" id="end"></div>
</div>

<br>
<button onclick="saveBooking()">บันทึก</button>
<button class="green" id="exportBtn" style="display:none" onclick="exportCSV()">Export CSV</button>
<button class="red" onclick="loginAdmin()" id="loginBtn">Admin Login</button>
<button class="purple" onclick="logoutAdmin()" id="logoutBtn" style="display:none">Logout Admin</button>

<div class="dashboard" id="dash"></div>

<div class="filter">
<select id="fcar"></select>
<select id="fdriver"></select>
<input type="date" id="fdate">
<button onclick="filterData()">Filter</button>
</div>

<table class="table">
<thead>
<tr>
<th>วันที่</th><th>รถ</th><th>โครงการ</th><th>ผู้ขับ</th><th>เวลา</th><th>สถานะ</th><th>จัดการ</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<div class="pagination" id="page"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwgckQR2Ty2mZAOdi8ExG2ZWCdQyPVhhMjvjwsSt8M9ishFmMFVFWjkzuvnWfq4gj48tw/exec";

let bookings=[];
let viewData=[];
let admin=false;
let adminName="";
let page=1;
let perPage=5;

const cars=["toyota yaris 6กญ1240","toyota yaris 6กฌ9085","toyota revo 1ฒภ6727","toyota revo 2ฒข4846"];
const people=["จิรศักดิ์","จุติมา","วัฒนะชาติ","โกเมน","อานนท์","รด","พิชชากร","สรวิศ.ก","สรวิศ.พ","ภูวดล","กฤษพล","ชยุต","เอมมิกา","ชัชโภคิณ","ณัฐพล","พัชรวรรณ"];

const carSel=document.getElementById("car");
const driverSel=document.getElementById("driver");
const p1Sel=document.getElementById("p1");
const p2Sel=document.getElementById("p2");

cars.forEach(c=>{
 carSel.add(new Option(c,c));
 document.getElementById("fcar").add(new Option(c,c));
});
document.getElementById("fcar").add(new Option("ทั้งหมด",""));

people.forEach(p=>{
 driverSel.add(new Option(p,p));
 document.getElementById("fdriver").add(new Option(p,p));
});
document.getElementById("fdriver").add(new Option("ทั้งหมด",""));

[p1Sel,p2Sel].forEach(s=>{
 s.add(new Option("-- ไม่มีผู้ร่วมเดินทาง --",""));
 people.forEach(p=>s.add(new Option(p,p)));
});

const today=new Date().toISOString().split("T")[0];
document.getElementById("date").min=today;

async function loadData(){
 const r=await fetch(API);
 bookings=await r.json();
 viewData=[...bookings];
 render();
 renderDash();
}

function renderDash(){
 const d=document.getElementById("date").value;
 let html="รถที่ใช้งาน:";
 cars.forEach(c=>{
  let busy=bookings.find(b=>b.date===d && b.car===c && b.status==="อนุมัติ");
  if(busy) html+=` 🔴 ${c}`;
 });
 document.getElementById("dash").innerHTML=html;
}

async function saveBooking(){
 const d=document.getElementById("date").value;
 if(d<today) return alert("ห้ามย้อนหลัง");

 const car=carSel.value;
 const driver=driverSel.value;
 const p1=p1Sel.value;
 const p2=p2Sel.value;

 if(p1 && p1===driver) return alert("ชื่อซ้ำ");
 if(p2 && (p2===driver||p2===p1)) return alert("ชื่อซ้ำ");

 const dup=bookings.find(b=>b.date===d && b.car===car && b.status==="อนุมัติ");
 if(dup) return alert("รถถูกใช้งานแล้ว");

 const url=`${API}?action=save&id=${Date.now()}&date=${d}&car=${encodeURIComponent(car)}&project=${encodeURIComponent(project.value)}&driver=${encodeURIComponent(driver)}&p1=${encodeURIComponent(p1)}&p2=${encodeURIComponent(p2)}&start=${start.value}&end=${end.value}`;
 await fetch(url);
 loadData();
}

async function approve(id){
 await fetch(`${API}?action=updateStatus&id=${id}&status=อนุมัติ&admin=${adminName}`);
 loadData();
}

async function deny(id){
 await fetch(`${API}?action=updateStatus&id=${id}&status=ไม่อนุมัติ&admin=${adminName}`);
 loadData();
}

function render(){
 let startIndex=(page-1)*perPage;
 let data=viewData.slice(startIndex,startIndex+perPage);
 let html="";

 data.forEach(b=>{

  let badge="<span class='badge wait'>รอ</span>";
  if(b.status==="อนุมัติ") badge="<span class='badge ok'>อนุมัติ</span>";
  if(b.status==="ไม่อนุมัติ") badge="<span class='badge no'>ไม่อนุมัติ</span>";

  let action=b.approvedBy||"-";

  if(admin && (b.status==="รอ" || b.status==="รออนุมัติ")){
   action=`<button class='green' onclick='approve("${b.id}")'>อนุมัติ</button>
           <button class='red' onclick='deny("${b.id}")'>ไม่อนุมัติ</button>`;
  }

  html+=`<tr>
   <td>${b.date}</td>
   <td>${b.car}</td>
   <td>${b.project}</td>
   <td>${b.driver}</td>
   <td>${b.start}-${b.end}</td>
   <td>${badge}</td>
   <td>${action}</td>
  </tr>`;
 });

 document.getElementById("tb").innerHTML=html;
 renderPagination();
}

function renderPagination(){
 let total=Math.ceil(viewData.length/perPage);
 if(total<=1){document.getElementById("page").innerHTML="";return}

 let html="";
 html+=`<button onclick='prevPage()'><</button>`;

 for(let i=1;i<=total;i++){
  html+=`<button onclick='goPage(${i})' ${i===page?"style=\"background:#0a8a2a\"":""}>${i}</button>`;
 }

 html+=`<button onclick='nextPage()'>></button>`;

 document.getElementById("page").innerHTML=html;
}

function prevPage(){page--; if(page<1)page=1; render()}
function nextPage(){page++; render()}
function goPage(p){page=p; render()}

function filterData(){
 const fc=document.getElementById("fcar").value;
 const fd=document.getElementById("fdriver").value;
 const fdt=document.getElementById("fdate").value;

 viewData=bookings.filter(b=>{
  return (!fc||b.car===fc)&&(!fd||b.driver===fd)&&(!fdt||b.date===fdt);
 });
 page=1;
 render();
}

function loginAdmin(){
 let p=prompt("รหัส");
 if(p==="11223344"){admin=true;adminName="จิรศักดิ์"}
 if(p==="12121212"){admin=true;adminName="จุติมา"}
 if(admin){
  loginBtn.style.display="none";
  logoutBtn.style.display="inline-block";
  exportBtn.style.display="inline-block";
 }
 render();
}

function logoutAdmin(){
 admin=false;adminName="";
 loginBtn.style.display="inline-block";
 logoutBtn.style.display="none";
 exportBtn.style.display="none";
 render();
}

function exportCSV(){
 let csv="date,car,project,driver,start,end,status\n";
 bookings.forEach(b=>{
  csv+=`${b.date},${b.car},${b.project},${b.driver},${b.start},${b.end},${b.status}\n`;
 });
 let blob=new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="fleet.csv";
 a.click();
}

window.onload=loadData;

</script>
</body>
</html>
