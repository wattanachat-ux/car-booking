<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เอกสารเบิกรถ Guts IOC</title>
<style>
body{font-family:Arial;background:#eef2f7;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;max-width:1400px;margin:auto;box-shadow:0 10px 30px rgba(0,0,0,.1)}
h2{margin-top:0}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
input,select{padding:8px;border:1px solid #ccc;border-radius:8px}
button{border:none;border-radius:8px;background:#2d6cdf;color:#fff;font-weight:bold;cursor:pointer;padding:10px}
button.red{background:#e5533d}
button.green{background:#0a8a2a}
button.gray{background:#555}
button.purple{background:#7b2cff}
.table{width:100%;border-collapse:collapse;margin-top:20px}
.table th,.table td{border:1px solid #ccc;padding:6px;text-align:center}
.status-ok{color:#0a8a2a;font-weight:bold}
.status-wait{color:#d18b00;font-weight:bold}
.status-no{color:#c10000;font-weight:bold}
</style>
</head>
<body>

<div class="card">
<h2>🚗 เอกสารเบิกรถ Guts IOC</h2>

<div class="grid">
<div><label>วันที่</label><input type="date" id="date" onchange="lockCarDropdown()"></div>
<div><label>ทะเบียนรถ</label><select id="car"></select></div>
<div><label>โครงการ</label><input id="project"></div>
<div><label>ผู้ขับ</label><select id="driver"></select></div>
<div><label>ผู้ร่วมเดินทาง 1</label><select id="p1"></select></div>
<div><label>ผู้ร่วมเดินทาง 2</label><select id="p2"></select></div>
<div><label>เวลาเริ่ม</label><input type="time" id="start"></div>
<div><label>เวลาจบ</label><input type="time" id="end"></div>
</div>

<br>
<button onclick="saveBooking()">บันทึก</button>
<button class="green" id="exportBtn" style="display:none" onclick="exportCSV()">Export CSV</button>
<button class="red" onclick="loginAdmin()" id="loginBtn">Admin Login</button>
<button class="purple" onclick="logoutAdmin()" id="logoutBtn" style="display:none">Admin Logout</button>

<table class="table">
<thead>
<tr>
<th>วันที่</th>
<th>รถ</th>
<th>โครงการ</th>
<th>ผู้ขับ</th>
<th>เวลา</th>
<th>สถานะ</th>
<th>จัดการ</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwgckQR2Ty2mZAOdi8ExG2ZWCdQyPVhhMjvjwsSt8M9ishFmMFVFWjkzuvnWfq4gj48tw/exec";

let bookings = [];
let admin=false;
let adminName="";

const cars=["toyota yaris 6กญ1240","toyota yaris 6กฌ9085","toyota revo 1ฒภ6727","toyota revo 2ฒข4846"];
const people=["จิรศักดิ์","จุติมา","วัฒนะชาติ","โกเมน","อานนท์","รด","พิชชากร","สรวิศ.ก","สรวิศ.พ","ภูวดล","กฤษพล","ชยุต","เอมมิกา","ชัชโภคิณ","ณัฐพล","พัชรวรรณ"];

const carSel=document.getElementById("car");
const driverSel=document.getElementById("driver");
const p1Sel=document.getElementById("p1");
const p2Sel=document.getElementById("p2");

cars.forEach(c=>carSel.add(new Option(c,c)));
people.forEach(p=>driverSel.add(new Option(p,p)));
[p1Sel,p2Sel].forEach(s=>{
 s.add(new Option("-- ไม่มีผู้ร่วมเดินทาง --",""));
 people.forEach(p=>s.add(new Option(p,p)));
});

async function loadData(){
 const res=await fetch(API);
 bookings=await res.json();
 renderTable();
}

function lockCarDropdown(){
 const d=document.getElementById("date").value;
 Array.from(carSel.options).forEach(o=>o.disabled=false);
 bookings.forEach(b=>{
  if(b.date===d && b.status==="อนุมัติ"){
   Array.from(carSel.options).forEach(o=>{
    if(o.value===b.car) o.disabled=true;
   });
  }
 });
}

async function saveBooking(){
 const d=document.getElementById("date").value;
 const car=carSel.value;
 const project=document.getElementById("project").value;
 const driver=driverSel.value;
 const p1=p1Sel.value;
 const p2=p2Sel.value;
 const start=document.getElementById("start").value;
 const end=document.getElementById("end").value;

 if(!d||!driver||!project||!start||!end) return alert("กรอกข้อมูลให้ครบ");

 if(p1 && (p1===driver)) return alert("ชื่อซ้ำ");
 if(p2 && (p2===driver||p2===p1)) return alert("ชื่อซ้ำ");

 const dup=bookings.find(b=>b.date===d && b.car===car && b.status==="อนุมัติ");
 if(dup) return alert("รถคันนี้ถูกอนุมัติแล้ว");

 const url=`${API}?action=save&id=${Date.now()}&date=${d}&car=${encodeURIComponent(car)}&project=${encodeURIComponent(project)}&driver=${encodeURIComponent(driver)}&p1=${encodeURIComponent(p1)}&p2=${encodeURIComponent(p2)}&start=${start}&end=${end}`;

 await fetch(url);
 loadData();
}

async function updateStatus(id,status){
 const url=`${API}?action=updateStatus&id=${id}&status=${encodeURIComponent(status)}&admin=${encodeURIComponent(adminName)}`;
 await fetch(url);
 loadData();
}

function renderTable(){
 let html="";
 bookings.forEach(b=>{

  let statusClass="status-wait";
  let statusText="รอ";
  if(b.status==="อนุมัติ"){statusClass="status-ok";statusText="อนุมัติ"}
  if(b.status==="ไม่อนุมัติ"){statusClass="status-no";statusText="ไม่อนุมัติ"}

  let action=b.approvedBy||"-";

  if(admin && b.status==="รอ"){
   action=`<button class='green' onclick="updateStatus('${b.id}','อนุมัติ')">อนุมัติ</button>
           <button class='red' onclick="updateStatus('${b.id}','ไม่อนุมัติ')">ไม่อนุมัติ</button>`;
  }

  html+=`<tr>
   <td>${b.date}</td>
   <td>${b.car}</td>
   <td>${b.project}</td>
   <td>${b.driver}</td>
   <td>${b.start}-${b.end}</td>
   <td class='${statusClass}'>${statusText}</td>
   <td>${action}</td>
  </tr>`;
 });

 document.getElementById("tb").innerHTML=html;
}

function loginAdmin(){
 let p=prompt("รหัส");
 if(p==="11223344"){admin=true;adminName="จิรศักดิ์"}
 if(p==="12121212"){admin=true;adminName="จุติมา"}
 if(admin){
  document.getElementById("loginBtn").style.display="none";
  document.getElementById("logoutBtn").style.display="inline-block";
  document.getElementById("exportBtn").style.display="inline-block";
 }
 renderTable();
}

function logoutAdmin(){
 admin=false;
 adminName="";
 document.getElementById("loginBtn").style.display="inline-block";
 document.getElementById("logoutBtn").style.display="none";
 document.getElementById("exportBtn").style.display="none";
 renderTable();
}

function exportCSV(){
 let csv="date,car,project,driver,p1,p2,start,end,status,approvedBy\n";
 bookings.forEach(b=>{
  csv+=`${b.date},${b.car},${b.project},${b.driver},${b.p1},${b.p2},${b.start},${b.end},${b.status},${b.approvedBy}\n`;
 });
 let blob=new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="fleet.csv";
 a.click();
}

window.onload=loadData;

</script>
</body>
</html>
